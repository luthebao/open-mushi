[package]
name = "tauri-plugin-detect"
version = "0.1.0"
authors = ["You"]
edition = "2024"
exclude = ["/js", "/node_modules"]
links = "tauri-plugin-detect"
description = ""

[features]
default = ["zoom", "sleep"]
zoom = ["openmushi-detect/zoom"]
language = ["openmushi-detect/language"]
sleep = ["openmushi-detect/sleep"]
test-support = []

[build-dependencies]
tauri-plugin = { workspace = true, features = ["build"] }

[dev-dependencies]
openmushi-detect = { workspace = true, features = ["mic"] }
specta-typescript = { workspace = true }
tauri-plugin-detect = { path = ".", features = ["test-support"] }
tokio = { workspace = true, features = ["test-util"] }

[dependencies]
openmushi-detect = { workspace = true, features = ["mic", "list", "language", "sleep"] }
openmushi-host = { workspace = true }
openmushi-notification-interface = { workspace = true }

tauri = { workspace = true, features = ["specta", "test"] }
tauri-plugin-settings = { workspace = true }
tauri-plugin-windows = { workspace = true }

specta = { workspace = true }
tauri-specta = { workspace = true, features = ["derive", "typescript"] }

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tokio-util = { workspace = true }
tracing = { workspace = true }
