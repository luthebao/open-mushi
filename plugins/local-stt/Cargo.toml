[package]
name = "tauri-plugin-local-stt"
version = "0.1.0"
authors = ["You"]
edition = "2024"
exclude = ["/js", "/node_modules"]
links = "tauri-plugin-local-stt"
description = ""

[features]
default = []
whisper-cpp = []

[build-dependencies]
tauri-plugin = { workspace = true, features = ["build"] }

[dev-dependencies]
openmushi-audio-utils = { workspace = true }
openmushi-data = { workspace = true }
openmushi-language = { workspace = true, features = ["whisper"] }

dirs = { workspace = true }
reqwest = { workspace = true }
rodio = { workspace = true }
similar = { workspace = true }
specta-typescript = { workspace = true }
tokio-tungstenite = { workspace = true }
tower = { workspace = true }

[dependencies]
openmushi-am = { workspace = true }
openmushi-stt-sherpa = { workspace = true }
openmushi-audio-utils = { workspace = true }
openmushi-cactus-model = { workspace = true }
openmushi-download-interface = { workspace = true }
openmushi-file = { workspace = true }
openmushi-host = { workspace = true }
openmushi-language = { workspace = true, features = ["whisper"] }
openmushi-model-downloader = { workspace = true }
openmushi-transcribe-cactus = { workspace = true }
openmushi-whisper-local-model = { workspace = true }
owhisper-interface = { workspace = true }

tauri = { workspace = true, features = ["test"] }
tauri-specta = { workspace = true, features = ["derive", "typescript"] }

tauri-plugin-settings = { workspace = true }
tauri-plugin-shell = { workspace = true }
tauri-plugin-sidecar2 = { workspace = true }
tauri-plugin-windows = { workspace = true }

dirs = { workspace = true }
json-patch = "4"
serde = { workspace = true }
serde_json = { workspace = true }
specta = { workspace = true }
strum = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

axum = { workspace = true, features = ["ws"] }
axum-extra = { workspace = true, features = ["query"] }
tower-http = { workspace = true, features = ["cors", "trace"] }

backon = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
tokio-util = { workspace = true }
tracing = { workspace = true }

openmushi-supervisor = { workspace = true }
ractor = { workspace = true, features = ["async-trait"] }

rodio = { workspace = true, features = ["symphonia-all"] }

port-killer = "0.1.0"
port_check = "0.3.0"
