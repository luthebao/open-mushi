[package]
name = "pyannote-local"
version = "0.1.0"
edition = "2024"

[features]
default = []
coreml = ["openmushi-onnx/coreml"]
directml = ["openmushi-onnx/directml"]
[dependencies]
openmushi-onnx = { workspace = true }

dasp = { workspace = true }
knf-rs = { git = "https://github.com/thewh1teagle/pyannote-rs", rev = "e23bd29", package = "knf-rs" }
simsimd = { version = "6" }

thiserror = { workspace = true }

serde = { workspace = true, features = ["derive"] }
specta = { workspace = true, features = ["derive"] }

[dev-dependencies]
openmushi-data = { workspace = true }

approx = { workspace = true }
rodio = { workspace = true }
