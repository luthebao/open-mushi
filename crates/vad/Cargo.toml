[package]
name = "vad"
version = "0.1.0"
edition = "2024"

[features]
earshot = ["dep:earshot"]
silero-onnx = ["dep:openmushi-onnx"]
silero-cactus = ["dep:openmushi-cactus"]

[dependencies]
earshot = { workspace = true, optional = true }
openmushi-cactus = { workspace = true, optional = true }
openmushi-onnx = { workspace = true, optional = true }
thiserror = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
criterion = { workspace = true }
openmushi-data = { workspace = true }
openmushi-onnx = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[[bench]]
name = "vad"
harness = false
required-features = ["earshot", "silero-onnx", "silero-cactus"]

[[test]]
name = "compare"
required-features = ["earshot", "silero-onnx", "silero-cactus"]
